---
machine:
  network:
    extraHostEntries:
      - ip: 192.168.50.252
        aliases:
          - keycloak.dev.bigbang.mil
          - openldap.dev.bigbang.mil

cluster:
  # Do not install flannel (default)
  network:
    cni:
      name: none

  apiServer:
    admissionControl:
      - name: PodSecurity
        configuration:
          defaults:
            enforce: privileged

---
apiVersion: v1alpha1
kind: HostnameConfig
auto: off
