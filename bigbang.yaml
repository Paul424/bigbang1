          #           - nodes
          #           - persistentvolumeclaims
          #           - persistentvolumes                  
          #         verbs: ["get", "list", "watch", "create", "update", "delete"]
          #       - apiGroups: ["apps"]
          #         resources: ["deployments", "daemonsets", "replicasets", "statefulsets"]
          #         verbs: ["get", "list", "watch", "create", "update", "delete"]
          #       - apiGroups: ["batch"]
          #         resources:
          #           - jobs
          #           - cronjobs
          #         verbs: ["get", "list", "watch", "create", "update", "delete"]
          #       - apiGroups: ["networking.k8s.io"]
          #         resources:
          #           - ingresses
          #           - networkpolicies
          #         verbs: ["get", "list", "watch", "create", "update", "delete"]

          clusterRoleBindings:
            - name: headlamp-viewers-binding
              roleRef: headlamp-viewer
              subjects:
                - kind: Group
                  name: "headlamp-viewers"
                  apiGroup: rbac.authorization.k8s.io
            # - name: headlamp-developers-binding
            #   roleRef: headlamp-developer
            #   subjects:
            #     - kind: Group
            #       name: "headlamp-developers"
            #       apiGroup: rbac.authorization.k8s.io
            - name: headlamp-admin-binding
              roleRef: cluster-admin
              subjects:
                - kind: Group
                  name: "headlamp-admins"
                  apiGroup: rbac.authorization.k8s.io

  keycloak:
    enabled: true
    values:
      networkPolicies:
        egress:
          from:
            keycloak:
              to:
                k8s:
                  openldap/*:1389: true
    #   upstream:
