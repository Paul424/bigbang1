helmRepositories:
  - name: "kubelauncher"
    repository: "oci://ghcr.io/kubelauncher/charts"
    type: "oci"
    provider: "generic"
    # username: 
    # password: 
  - name: "openldap"
    repository: "https://jp-gouin.github.io/helm-openldap"
    type: "default"
    provider: "generic"
    # username: 
    # password: 

istiod:
  values:
    hardened:
      # Enable istio hardened so we generate AuthorizationPolicies for the components
      enabled: true
    upstream:
      meshConfig:
        defaultConfig:
          proxyMetadata:
            SECRET_TTL: 2880m  # Default TTLS for workload crts set to 2 days to survive laptop in sleep for several hours

