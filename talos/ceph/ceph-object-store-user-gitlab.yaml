---
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-object-store-user-keys
  namespace: rook-ceph
data:
  access-key: YWNjZXNz
  secret-key: c2VjcmV0
---
apiVersion: ceph.rook.io/v1
kind: CephObjectStoreUser
metadata:
  name: gitlab
  namespace: rook-ceph
spec:
  store: ceph-objectstore
  displayName: gitlab
  quotas:
    maxBuckets: 100
  capabilities:
    user: "*"
    bucket: "*"
  opMask:
    - read
    - write
    - delete
  keys:
    - accessKeyRef:
        key: access-key
        name: gitlab-object-store-user-keys
      secretKeyRef:
        key: secret-key
        name: gitlab-object-store-user-keys
---
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: gitlab-artifacts
  namespace: rook-ceph
spec:
  bucketName: gitlab-artifacts
  generateBucketName: gitlab-artifacts
  storageClassName: ceph-bucket
  additionalConfig:
    bucketOwner: "gitlab"
