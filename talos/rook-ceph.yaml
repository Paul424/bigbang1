


operatorNamespace: rook-ceph
cephClusterSpec:
  dashboard:
    enabled: true
  healthCheck:
    daemonHealth:
      mon:
        interval: 45s
      osd:
        interval: 1m0s
      status:
        interval: 1m0s
  resources:
    mgr:
      limits:
        memory: 1Gi
      requests:
        cpu: 150m
        memory: 128Mi
    mon:
      limits:
        memory: 2Gi
      requests:
        cpu: 150m
        memory: 512Mi
    osd:
      limits:
        memory: 4Gi
      requests:
        cpu: 150m
        memory: 512Mi
