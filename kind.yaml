kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  image: kindest/node:v1.35.0@sha256:452d707d4862f52530247495d180205e029056831160e22870e37e3f6c1ac31f
  extraMounts:
    - hostPath: ./authentication-configuration.yaml
      containerPath: /opt/authentication-configuration.yaml
  # OIDC setup for api-server to enable token validation for headlamp requests (and from kubectl requests when using OIDC Authentication)
  # See: https://repo1.dso.mil/big-bang/product/packages/headlamp/-/blob/main/docs/keycloak.md?ref_type=heads
  kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    apiServer:
      extraArgs:
        authentication-config: /opt/authentication-configuration.yaml
      extraVolumes:
        - name: authentication-configuration
          hostPath: /opt/authentication-configuration.yaml
          mountPath: /opt/authentication-configuration.yaml
          readOnly: true
  # extraPortMappings:
  # - containerPort: 80
  #   hostPort: 80

- role: worker
  image: kindest/node:v1.35.0@sha256:452d707d4862f52530247495d180205e029056831160e22870e37e3f6c1ac31f
- role: worker
  image: kindest/node:v1.35.0@sha256:452d707d4862f52530247495d180205e029056831160e22870e37e3f6c1ac31f

# Old style OIDC setup for api-server (only allows for a single audience / client-id)
# oidc-client-id: kubernetes
# oidc-issuer-url: https://keycloak.dev.bigbang.mil/auth/realms/me-yoda
# oidc-username-claim: preferred_username
# oidc-groups-claim: groups
