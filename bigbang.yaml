neuvector:
  enabled: false
  sso:
    enabled: true
    client_id: kind-neuvector
    client_secret: qrDDs3fVMTasvKGgw3MiY7FqKOHxcWxY
    default_role: null
  values:
    upstream:
      controller:
        secret:
          data:
            oidcinitcfg.yaml:
              group_claim: groups
              group_mapped_roles:
                - group: neuvector-admins 
                  global_role: admin 
                - group: neuvector-developers
                  global_role: ciops
                - group: neuvector-viewers
                  global_role: reader

addons:
  metricsServer:
    values:
      upstream:
        args:
        # Fixes on kind: Failed to scrape node" err="Get \"https://172.18.0.3:10250/metrics/resource\": tls: failed to verify certificate: x509: cannot  │lida ││ validate certificate for 172.18.0.3 because it doesn't contain any IP SANs" node="bb1-control-plane" 
        - --kubelet-insecure-tls

  authservice:
    enabled: true

  headlamp:
    enabled: true
    sso:
      enabled: true
      client_id: kind-headlamp
      # Headlamp uses PKCE (public client) - no client_secret required
    values:
      upstream:
        env:
          - name: HEADLAMP_CONFIG_LOG_LEVEL
            value: "debug"
        config:
          oidc:
            scopes: "openid,email,profile,groups"
      
      bigbang:
        rbac:
          enabled: true
          clusterRoles:
            - name: headlamp-viewer
              create: true
              rules:
                - apiGroups: [""]
                  resources: ["pods", "services", "configmaps", "namespaces"]
                  verbs: ["get", "list", "watch"]
                - apiGroups: ["apps"]
                  resources:
                    - deployments
                    - daemonsets
                    - replicasets
                    - statefulsets
                  verbs: ["get", "list", "watch"]
          #   # See issue https://repo1.dso.mil/big-bang/product/packages/headlamp/-/issues/81 but since fred is an admin (existing role it's not an issue for now)
          #   - name: headlamp-developer
          #     create: true
