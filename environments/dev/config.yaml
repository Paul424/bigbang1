    grafana:
      client_id: kind-grafana
      client_secret: W3PEfhtMZHV3qEjNx81pGzSKdb993bXC
      scopes: "openid grafana"
  values:
    upstream:
      grafana.ini:
        auth.generic_oauth:
          # Map Keycloak roles (show up as multi-value groups claim) to Grafana roles (GrafanaAdmin, Admin, Editor, Viewer)
          role_attribute_path: contains(groups[*], 'monitoring-admins') && 'GrafanaAdmin' || contains(groups[*], 'monitoring-developers') && 'Editor' || 'Viewer'
          # Allow users to be assigned the Grafana admin role
          allow_assign_grafana_admin: true
          # User (group) to Organisation mapping
          org_attribute_path: teams[?starts_with(@, '/teams')]
          # Notice the named orgs need to be precreated in Grafana
          org_mapping: "/teams/team-ops:Ops /teams/team-sustaining:Sustaining /teams/team-yellow:Yellow"

