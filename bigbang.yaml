# Overrides / Confs for this specific deployment
kyvernoPolicies:
  values:
    exclude:
      any:
      # Kind cluster have a helper-pod-create-pvc-*** in namespace local-path-storage to setup storage backed by the host
      - resources:
          namespaces:
          - local-path-storage
          names:
          - helper-pod-create-pvc-*
      # openldap
      - resources:
          namespaces:
          - openldap
          names:
          - openldap-*
          - dev-openldap-*

    policies:
      restrict-image-registries:
        parameters:
          allow:
          # - registry1.dso.mil
          # - registry.dso.mil
          - nicolaka  # netshoot debug image
          # - ghcr.io/kubelauncher/openldap  # openldap
          # - jpgouin/openldap  # openldap
          # - bitnami/openldap  # openldap
          # - debian  # openldap
      restrict-host-path-mount-pv:
        parameters:
          # Kind cluster is using local-path-provisioner configured to map volumes to /var/local-path-provisioner
          allow:
          - /var/local-path-provisioner
          - /var/local-path-provisioner/*
      require-non-root-user:
        exclude:
          any:
          - resources:
              namespaces:
              - openldap
              names:
              - openldap-*

