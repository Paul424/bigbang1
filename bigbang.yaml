    #       - "start"
    #       - "--debug"
    #       - "--verbose"
        #   - "--import <path>"

  minio:
    enabled: false

  mattermost:
    enabled: false
    sso:
      enabled: true
      client_id: kind-mattermost
      client_secret: "Mu5htteQAnFv1hEwoM9p1qgi38dkXsSz"
    values:
      resources:
        limits:
          cpu: 50m
          memory: 4Gi
        requests:
          cpu: 50m
          memory: 128Mi

packages:
  openldap:
    enabled: true
    sourceType: "git"
    git:
      repo: https://github.com/Paul424/openldap.git
      path: "./manifests"
      branch: main
    kustomize: true
    passBigBangValues: false
    wrapper:
      enabled: true
      postRenderers: []
    flux:
      timeout: 5m
    postRenderers: []
    dependsOn: []
    istio:
      hosts:
        - names:
            - openldap
          gateways:
            - istio-gateway/passthrough-ingressgateway
          destination:
            protocol: tcp
            service: openldap
            port: 1389
      hardened:
        customAuthorizationPolicies:
          - name: allow-ingress-to-openldap-tcp-port-1389-from-ns-keycloak
            enabled: true
            spec:
              action: ALLOW
              rules:
              - from:
                - source:
                    principals:
                    - cluster.local/ns/keycloak/sa/keycloak-keycloak
                to:
                - operation:
                    ports:
                    - "1389"
              selector:
                matchLabels:
                  app: openldap
    monitor: {}
    network:
      additionalPolicies:
        - name: allow-ingress-to-openldap-1389-from-ns-keycloak
          spec:
            ingress:
            - from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: keycloak
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: keycloak
              ports:
              - port: 1389
                protocol: TCP
            podSelector:
              matchLabels:
                app: openldap
            policyTypes:
            - Ingress
    secrets: {}
    configMaps: {}
    # values: {}

