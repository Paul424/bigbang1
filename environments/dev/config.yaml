            limits:
              memory: 4Gi
            requests:
              cpu: 150m
              memory: 512Mi
          crashcollector:
            limits:
              memory: "60Mi"
            requests:
              cpu: "50m"
              memory: "60Mi"
          logcollector:
            limits:
              memory: "1Gi"
            requests:
              cpu: "50m"
              memory: "100Mi"
