apiVersion: v1
kind: Namespace
metadata:
  name: bigbang
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: bigbang-environment
  namespace: bigbang
spec:
  interval: 1m
  url: https://github.com/Paul424/bigbang1
  ref:
    branch: from-quickstart-to-gitrepo
  secretRef:
    name: private-git
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: bigbang-environment
  namespace: bigbang
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: bigbang-environment
  path: ./environments/dev
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg
