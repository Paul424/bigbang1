                name: data0
            metadataServer:
              activeCount: 1
              activeStandby: true
              resources:
                limits:
                  memory: "4Gi"
                requests:
                  cpu: "100m"
                  memory: "256Mi"
              priorityClassName: system-cluster-critical
          storageClass:
            enabled: true
            isDefault: false
            name: ceph-filesystem
            # (Optional) specify a data pool to use, must be the name of one of the data pools above, 'data0' by default
            pool: data0
            reclaimPolicy: Delete
            allowVolumeExpansion: true
            volumeBindingMode: "Immediate"
            annotations: {}
            labels: {}
            mountOptions: []
            # see https://github.com/rook/rook/blob/master/Documentation/Storage-Configuration/Shared-Filesystem-CephFS/filesystem-storage.md#provision-storage for available configuration
            parameters:
              # The secrets contain Ceph admin credentials.
              csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
              csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
              csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
              csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
              csi.storage.k8s.io/controller-publish-secret-name: rook-csi-cephfs-provisioner
              csi.storage.k8s.io/controller-publish-secret-namespace: "{{ .Release.Namespace }}"
              csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
              csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
              # Specify the filesystem type of the volume. If not specified, csi-provisioner
              # will set default as `ext4`. Note that `xfs` is not recommended due to potential deadlock
              # in hyperconverged settings where the volume is mounted on the same node as the osds.
              csi.storage.k8s.io/fstype: ext4
      cephObjectStores:
        - name: ceph-objectstore
          # see https://github.com/rook/rook/blob/master/Documentation/CRDs/Object-Storage/ceph-object-store-crd.md#object-store-settings for available configuration
          spec:
            metadataPool:
              failureDomain: host
              replicated:
                size: 3
            dataPool:
              failureDomain: host
              erasureCoded:
                dataChunks: 2
                codingChunks: 1
              parameters:
                bulk: "true"
            preservePoolsOnDelete: true
            gateway:
              port: 80
              resources:
                limits:
                  memory: "2Gi"
                requests:
                  cpu: "100m"
                  memory: "256Mi"
              # securePort: 443
              # sslCertificateRef:
              instances: 1
              priorityClassName: system-cluster-critical
              # opsLogSidecar:
              #   resources:
              #     limits:
              #       memory: "100Mi"
              #     requests:
              #       cpu: "100m"
              #       memory: "40Mi"
          storageClass:
            enabled: true
            name: ceph-bucket
            reclaimPolicy: Delete
            volumeBindingMode: "Immediate"
            annotations: {}
            labels: {}
            # see https://github.com/rook/rook/blob/master/Documentation/Storage-Configuration/Object-Storage-RGW/ceph-object-bucket-claim.md#storageclass for available configuration
            parameters:
              # note: objectStoreNamespace and objectStoreName are configured by the chart
              region: us-east-1
          ingress:
            # Enable an ingress for the ceph-objectstore
            enabled: false
            # The ingress port by default will be the object store's "securePort" (if set), or the gateway "port".
            # To override those defaults, set this ingress port to the desired port.
            # port: 80
            # annotations: {}
            # host:
            #   name: objectstore.example.com
            #   path: /
            #   pathType: Prefix
            # tls:
            # - hosts:
            #     - objectstore.example.com
            #   secretName: ceph-objectstore-tls
            # ingressClassName: nginx
          route:
            # Enable an ingress for the ceph-objectstore
            enabled: false
            # The ingress port by default will be the object store's "securePort" (if set), or the gateway "port".
            # To override those defaults, set this ingress port to the desired port.
            # port: 80
            # annotations: {}
            # host:
            #   name: objectstore.example.com
            #   path: /
            #   pathType: PathPrefix
            # parentRefs:
            #   - name: internal
            #     namespace: kube-system
            #     sectionName: https

  rook-ceph-cluster-config:
    enabled: true
    namespace:
      name: rook-ceph
      create: false
    sourceType: "git"
    git:
      repo: https://github.com/Paul424/rook-ceph-config.git
      path: "./charts/rook-ceph-config"
      branch: main
    # passBigBangValues: false
    # wrapper:
    #   enabled: false
    #   postRenderers: []
    flux:
      timeout: 5m
    # postRenderers: []
    dependsOn:
      - name: rook-ceph-cluster
    # istio: {}
    # monitor: {}
    # secrets: {}
    # configMaps: {}
    values:
      service:
        type: LoadBalancer
        loadBalancerIP: 192.168.50.253
      objectStoreUsers:
        - name: gitlab
          keys:
            - accessKeyRef:
                key: access-key
                name: gitlab-object-store-user-keys
              secretKeyRef:
                key: secret-key
                name: gitlab-object-store-user-keys    
      buckets:
        - name: gitlab-artifacts
          owner: gitlab
        - name: gitlab-backup
          owner: gitlab
        - name: gitlab-backup-tmp
          owner: gitlab
        - name: gitlab-dependency-proxy
          owner: gitlab
        - name: gitlab-mr-diffs
          owner: gitlab
        - name: gitlab-lfs
          owner: gitlab
        - name: gitlab-packages
          owner: gitlab
        - name: gitlab-pseudo
          owner: gitlab
        - name: gitlab-terraform-state
          owner: gitlab
        - name: gitlab-uploads
          owner: gitlab
        - name: gitlab-registry
          owner: gitlab

  openldap:
    enabled: true
    sourceType: "git"
    git:
      repo: https://github.com/Paul424/openldap.git
      path: "./manifests"
      branch: main
    kustomize: true
    passBigBangValues: false
    wrapper:
      enabled: true
      postRenderers: []
    flux:
      timeout: 5m
    postRenderers: []
    dependsOn: []
    istio:
      hosts:
        - names:
            - openldap
          gateways:
            - istio-gateway/passthrough-ingressgateway
          destination:
            protocol: tcp
            service: openldap
            port: 1389
      hardened:
        customAuthorizationPolicies:
          - name: allow-ingress-to-openldap-tcp-port-1389-from-ns-keycloak
            enabled: true
            spec:
              action: ALLOW
              rules:
              - from:
                - source:
                    principals:
                    - cluster.local/ns/keycloak/sa/keycloak-keycloak
                to:
                - operation:
                    ports:
                    - "1389"
              selector:
                matchLabels:
                  app: openldap
    monitor: {}
    network:
      additionalPolicies:
        - name: allow-ingress-to-openldap-1389-from-ns-keycloak
          spec:
            ingress:
            - from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: keycloak
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: keycloak
              ports:
              - port: 1389
                protocol: TCP
            podSelector:
              matchLabels:
                app: openldap
            policyTypes:
            - Ingress
    secrets: {}
    configMaps: {}
    # values: {}

  # Crossplane is a community addition and has been abandoned over a year now, so for now don't bother trying.
  crossplane:
    enabled: false
    git:
      repo: https://repo1.dso.mil/big-bang/product/community/crossplane.git
      tag: 1.20.0-bb.0
      path: chart
    values: {}

