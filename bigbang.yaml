sso:
  name: keycloak
  url: https://keycloak.dev.bigbang.mil/auth/realms/me-yoda
  # Override to use the on-cluster dns name (since we have keycloak running locally)
  # token_url: https://keycloak-keycloak-http.keycloak.svc.cluster.local:8443/auth/realms/me-yoda/protocol/openid-connect/token

# Probably better for now to switch off neuvector completely because multiple issues here and we could do without the function.
neuvector:
  values:
    containerd:
      enabled: true
    controller:
      podAnnotations:
        traffic.sidecar.istio.io/excludeInboundPorts: "18500,18301"
        traffic.sidecar.istio.io/excludeOutboundPorts: "18301"

addons:
  metricsServer:
    values:
      upstream:
        args:
        - --kubelet-insecure-tls

  authservice:
    enabled: true

  keycloak:
    enabled: true
