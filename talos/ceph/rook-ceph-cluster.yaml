


operatorNamespace: rook-ceph
toolbox:
  enabled: true
  resources:
    requests:
      cpu: "10m"
      memory: "16Mi"  
cephClusterSpec:
  dashboard:
    enabled: true
  healthCheck:
    daemonHealth:
      mon:
        interval: 45s
      osd:
        interval: 1m0s
      status:
        interval: 1m0s
  resources:
    mgr:
      limits:
        memory: 1Gi
      requests:
        cpu: 150m
        memory: 128Mi
    mon:
      limits:
        memory: 2Gi
      requests:
        cpu: 150m
        memory: 512Mi
    osd:
      limits:
        memory: 4Gi
      requests:
        cpu: 150m
        memory: 512Mi
    crashcollector:
      limits:
        memory: "60Mi"
      requests:
        cpu: "50m"
        memory: "60Mi"
    logcollector:
      limits:
        memory: "1Gi"
      requests:
        cpu: "50m"
        memory: "100Mi"


